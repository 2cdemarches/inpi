<!DOCTYPE html>
<html>
<head><title>Générer icônes</title></head>
<body>
<script>
const sizes = [16, 48, 128];
sizes.forEach(size => {
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#1e40af';
  ctx.beginPath();
  ctx.roundRect(0, 0, size, size, size * 0.2);
  ctx.fill();
  ctx.fillStyle = 'white';
  ctx.font = `bold ${size * 0.55}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('i', size / 2, size / 2 + size * 0.02);

  const link = document.createElement('a');
  link.download = `icon${size}.png`;
  link.href = canvas.toDataURL();
  link.textContent = `Télécharger icon${size}.png`;
  link.style.display = 'block';
  link.style.margin = '8px';
  document.body.appendChild(link);
});
document.body.insertAdjacentHTML('afterbegin', '<p style="margin:8px;font-family:sans-serif">Cliquez sur chaque lien pour télécharger les icônes, puis placez-les dans le dossier <code>icons/</code></p>');
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sync INPI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; width: 300px; background: #f8fafc; color: #1e293b; }

    .header { background: #1e40af; color: white; padding: 14px 16px; display: flex; align-items: center; gap: 10px; }
    .header h1 { font-size: 14px; font-weight: 600; }
    .header span { font-size: 20px; }

    .body { padding: 16px; space-y: 12px; }

    .status-box { border-radius: 10px; padding: 12px 14px; margin-bottom: 12px; font-size: 13px; }
    .status-ok   { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
    .status-warn { background: #fffbeb; border: 1px solid #fde68a; color: #92400e; }
    .status-err  { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }
    .status-none { background: #f1f5f9; border: 1px solid #e2e8f0; color: #475569; }

    .status-label { font-weight: 600; margin-bottom: 4px; }
    .status-time  { font-size: 11px; opacity: 0.7; margin-top: 4px; }

    label { display: block; font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; margin-top: 12px; }
    input { width: 100%; border: 1px solid #e2e8f0; border-radius: 8px; padding: 8px 10px; font-size: 12px; font-family: monospace; outline: none; }
    input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px #bfdbfe; }

    .btn { width: 100%; margin-top: 12px; padding: 9px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity .15s; }
    .btn:hover { opacity: .85; }
    .btn-save { background: #1e40af; color: white; }
    .btn-sync { background: #059669; color: white; margin-top: 8px; }

    .divider { border: none; border-top: 1px solid #e2e8f0; margin: 14px 0; }
    .footer { font-size: 11px; color: #94a3b8; text-align: center; padding: 10px 16px 14px; }
  </style>
</head>
<body>
  <div class="header">
    <span>🏛️</span>
    <h1>Sync INPI — 2C Expertise</h1>
  </div>

  <div class="body">
    <div id="status" class="status-box status-none">
      <div class="status-label">Non configuré</div>
      <div>Renseignez vos paramètres ci-dessous.</div>
    </div>

    <button class="btn btn-sync" id="btn-sync">⟳ Synchroniser maintenant</button>
    <button class="btn btn-inpi" id="btn-inpi" style="background:#dc2626;color:white;width:100%;margin-top:8px;padding:9px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;">
      🔑 Se reconnecter à l'INPI
    </button>

    <hr class="divider">

    <label>URL de votre app</label>
    <input type="url" id="app_url" placeholder="https://votre-app.vercel.app" />

    <label>Token personnel (depuis ⚙️ Paramètres)</label>
    <input type="text" id="user_token" placeholder="abc123..." />

    <button class="btn btn-save" id="btn-save">Enregistrer</button>
  </div>

  <div class="footer">Vérification toutes les 20 min · Notification avant expiration</div>

  <script src="popup.js"></script>
</body>
</html>

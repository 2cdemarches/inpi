<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>2C Expertise</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; width: 300px; background: #f8fafc; color: #1e293b; }

    .header { background: #1e40af; color: white; padding: 14px 16px; display: flex; align-items: center; gap: 10px; }
    .header h1 { font-size: 14px; font-weight: 600; }

    .body { padding: 16px; }

    .status-box { border-radius: 10px; padding: 12px 14px; margin-bottom: 12px; font-size: 13px; }
    .status-ok   { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
    .status-warn { background: #fffbeb; border: 1px solid #fde68a; color: #92400e; }
    .status-err  { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }
    .status-none { background: #f1f5f9; border: 1px solid #e2e8f0; color: #475569; }
    .status-label { font-weight: 600; margin-bottom: 4px; }
    .status-time  { font-size: 11px; opacity: 0.7; margin-top: 4px; }

    .section-title { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.06em; margin: 14px 0 8px; border-bottom: 1px solid #e2e8f0; padding-bottom: 4px; }

    label { display: block; font-size: 11px; font-weight: 600; color: #64748b; margin-bottom: 3px; margin-top: 10px; }
    input { width: 100%; border: 1px solid #e2e8f0; border-radius: 8px; padding: 8px 10px; font-size: 12px; outline: none; background: white; }
    input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px #bfdbfe; }

    .btn { width: 100%; margin-top: 8px; padding: 9px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn:hover { opacity: .85; }
    .btn-save  { background: #1e40af; color: white; margin-top: 12px; }
    .btn-sync  { background: #059669; color: white; }
    .btn-login { background: #7c3aed; color: white; }

    .footer { font-size: 11px; color: #94a3b8; text-align: center; padding: 8px 16px 12px; }
    .badge-ok  { display:inline-block; background:#dcfce7; color:#166534; border-radius:6px; padding:1px 6px; font-size:10px; font-weight:700; }
    .badge-ko  { display:inline-block; background:#fee2e2; color:#991b1b; border-radius:6px; padding:1px 6px; font-size:10px; font-weight:700; }
  </style>
</head>
<body>
  <div class="header">
    <span>🏛️</span>
    <h1>2C Expertise — INPI Auto</h1>
  </div>

  <div class="body">
    <div id="status" class="status-box status-none">
      <div class="status-label">Non configuré</div>
      <div>Renseignez vos paramètres ci-dessous.</div>
    </div>

    <button class="btn btn-sync" id="btn-sync">⟳ Synchroniser maintenant</button>
    <button class="btn btn-login" id="btn-login" style="margin-top:6px">🔑 Reconnecter à l'INPI maintenant</button>

    <div class="section-title">Connexion INPI (automatique)</div>
    <label>Email INPI</label>
    <input type="email" id="inpi_login" placeholder="votre@email.fr" autocomplete="username" />
    <label>Mot de passe INPI</label>
    <input type="password" id="inpi_password" placeholder="••••••••" autocomplete="current-password" />

    <div class="section-title">Application 2C Expertise</div>
    <label>URL de l'app</label>
    <input type="url" id="app_url" placeholder="https://inpi-ten.vercel.app" />
    <label>Token personnel (⚙️ Paramètres)</label>
    <input type="text" id="user_token" placeholder="abc123…" />

    <button class="btn btn-save" id="btn-save">💾 Enregistrer</button>
  </div>

  <div class="footer">Vérification toutes les 20 min · Reconnexion automatique</div>

  <script src="popup.js"></script>
</body>
</html>
